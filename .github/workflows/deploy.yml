name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'q-reversi-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Build Flutter web
        working-directory: q-reversi-app
        run: flutter build web --base-href "/q-reversi/" --release

      - name: Deploy to docs/
        run: |
          rm -rf docs
          mkdir docs
          cp -r q-reversi-app/build/web/. docs/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "chore: deploy web app [skip ci]"
          git push
